<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Calculator - Tính Toán Ngày Tháng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .calculator {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        label {
            color: #555;
            font-weight: 500;
        }

        input[type="date"],
        input[type="number"],
        select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="date"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            border-left: 4px solid #4caf50;
        }

        .result.show {
            display: block;
        }

        .result-text {
            color: #2e7d32;
            font-size: 18px;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Date Calculator</h1>
        
        <div class="calculator">
            <!-- Tính khoảng cách giữa 2 ngày -->
            <div class="section">
                <h2>Tính Khoảng Cách Giữa 2 Ngày</h2>
                <div class="input-group">
                    <label>Ngày bắt đầu:</label>
                    <input type="datetime-local" id="diffStart" step="0.001">
                </div>
                <div class="input-group">
                    <label>Ngày kết thúc:</label>
                    <input type="datetime-local" id="diffEnd" step="0.001">
                </div>
                <button onclick="calculateDiff()">Tính Khoảng Cách</button>
                <div class="result" id="diffResult">
                    <div class="result-text" id="diffText"></div>
                </div>
            </div>

            <!-- So sánh nhiều ngày -->
            <div class="section">
                <h2>So Sánh Nhiều Ngày</h2>
                <div id="multiDateInputs">
                    <div class="input-group">
                        <label>Ngày 1:</label>
                        <input type="datetime-local" class="multi-date" step="0.001">
                    </div>
                    <div class="input-group">
                        <label>Ngày 2:</label>
                        <input type="datetime-local" class="multi-date" step="0.001">
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button onclick="addDateInput()">➕ Thêm Ngày</button>
                    <button onclick="compareMultiDates()">So Sánh</button>
                </div>
                <div class="result" id="multiResult">
                    <div class="result-text" id="multiText"></div>
                </div>
            </div>

            <!-- Thêm/Trừ ngày -->
            <div class="section">
                <h2>Thêm/Trừ Ngày Tháng</h2>
                <div class="input-group">
                    <label>Ngày gốc:</label>
                    <input type="date" id="addDate" value="2026-03-20">
                </div>
                <div class="grid">
                    <div class="input-group">
                        <label>Số lượng:</label>
                        <input type="number" id="addAmount" value="30">
                    </div>
                    <div class="input-group">
                        <label>Đơn vị:</label>
                        <select id="addUnit">
                            <option value="days">Ngày</option>
                            <option value="weeks">Tuần</option>
                            <option value="months">Tháng</option>
                            <option value="years">Năm</option>
                        </select>
                    </div>
                </div>
                <button onclick="calculateAdd()">Tính Toán</button>
                <div class="result" id="addResult">
                    <div class="result-text" id="addText"></div>
                </div>
            </div>

            <!-- Thông tin ngày -->
            <div class="section">
                <h2>Thông Tin Ngày</h2>
                <div class="input-group">
                    <label>Chọn ngày:</label>
                    <input type="date" id="infoDate" value="2026-03-20">
                </div>
                <button onclick="getDateInfo()">Xem Thông Tin</button>
                <div class="result" id="infoResult">
                    <div class="result-text" id="infoText"></div>
                </div>
            </div>

            <!-- Tính tuổi -->
            <div class="section">
                <h2>Tính Tuổi</h2>
                <div class="input-group">
                    <label>Ngày sinh:</label>
                    <input type="date" id="birthDate" value="1990-01-01">
                </div>
                <button onclick="calculateAge()">Tính Tuổi</button>
                <div class="result" id="ageResult">
                    <div class="result-text" id="ageText"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tính khoảng cách giữa 2 ngày
        function calculateDiff() {
            const start = new Date(document.getElementById('diffStart').value);
            const end = new Date(document.getElementById('diffEnd').value);
            
            const diffMs = Math.abs(end - start);
            const diffSeconds = Math.floor(diffMs / 1000);
            const diffMinutes = Math.floor(diffSeconds / 60);
            const diffHours = Math.floor(diffMinutes / 60);
            const diffDays = Math.floor(diffHours / 24);
            const diffWeeks = Math.floor(diffDays / 7);
            const diffMonths = Math.floor(diffDays / 30.44);
            const diffYears = Math.floor(diffDays / 365.25);
            
            // Chi tiết
            const ms = diffMs % 1000;
            const sec = diffSeconds % 60;
            const min = diffMinutes % 60;
            const hrs = diffHours % 24;
            
            let result = `
                <strong>Tổng:</strong><br>
                • ${diffMs.toLocaleString()} milliseconds<br>
                • ${diffSeconds.toLocaleString()} giây<br>
                • ${diffMinutes.toLocaleString()} phút<br>
                • ${diffHours.toLocaleString()} giờ<br>
                • ${diffDays.toLocaleString()} ngày<br>
            `;
            
            if (diffWeeks > 0) result += `• ${diffWeeks} tuần<br>`;
            if (diffMonths > 0) result += `• ${diffMonths} tháng<br>`;
            if (diffYears > 0) result += `• ${diffYears} năm<br>`;
            
            result += `<br><strong>Chi tiết:</strong><br>`;
            result += `${diffDays} ngày, ${hrs} giờ, ${min} phút, ${sec} giây, ${ms} ms`;
            
            document.getElementById('diffText').innerHTML = result;
            document.getElementById('diffResult').classList.add('show');
        }

        // Thêm/Trừ ngày
        function calculateAdd() {
            const date = new Date(document.getElementById('addDate').value);
            const amount = parseInt(document.getElementById('addAmount').value);
            const unit = document.getElementById('addUnit').value;
            
            let newDate = new Date(date);
            
            switch(unit) {
                case 'days':
                    newDate.setDate(newDate.getDate() + amount);
                    break;
                case 'weeks':
                    newDate.setDate(newDate.getDate() + (amount * 7));
                    break;
                case 'months':
                    newDate.setMonth(newDate.getMonth() + amount);
                    break;
                case 'years':
                    newDate.setFullYear(newDate.getFullYear() + amount);
                    break;
            }
            
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            const formatted = newDate.toLocaleDateString('vi-VN', options);
            
            document.getElementById('addText').innerHTML = `<strong>${formatted}</strong><br>${newDate.toISOString().split('T')[0]}`;
            document.getElementById('addResult').classList.add('show');
        }

        // Thông tin ngày
        function getDateInfo() {
            const date = new Date(document.getElementById('infoDate').value);
            
            const weekdays = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            const weekday = weekdays[date.getDay()];
            
            const dayOfYear = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
            const weekOfYear = Math.ceil(dayOfYear / 7);
            
            const quarter = Math.ceil((date.getMonth() + 1) / 3);
            
            const isLeapYear = (year) => (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
            const leap = isLeapYear(date.getFullYear()) ? 'Có' : 'Không';
            
            const result = `
                <strong>Thứ:</strong> ${weekday}<br>
                <strong>Ngày thứ:</strong> ${dayOfYear} trong năm<br>
                <strong>Tuần thứ:</strong> ${weekOfYear} trong năm<br>
                <strong>Quý:</strong> Q${quarter}<br>
                <strong>Năm nhuận:</strong> ${leap}
            `;
            
            document.getElementById('infoText').innerHTML = result;
            document.getElementById('infoResult').classList.add('show');
        }

        // Tính tuổi
        function calculateAge() {
            const birthDate = new Date(document.getElementById('birthDate').value);
            const today = new Date();
            
            let years = today.getFullYear() - birthDate.getFullYear();
            let months = today.getMonth() - birthDate.getMonth();
            let days = today.getDate() - birthDate.getDate();
            
            if (days < 0) {
                months--;
                days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
            }
            
            if (months < 0) {
                years--;
                months += 12;
            }
            
            const totalDays = Math.floor((today - birthDate) / (1000 * 60 * 60 * 24));
            const totalWeeks = Math.floor(totalDays / 7);
            const totalMonths = years * 12 + months;
            
            const result = `
                <strong>${years}</strong> tuổi, <strong>${months}</strong> tháng, <strong>${days}</strong> ngày<br>
                Tổng: ${totalDays} ngày (${totalWeeks} tuần, ${totalMonths} tháng)
            `;
            
            document.getElementById('ageText').innerHTML = result;
            document.getElementById('ageResult').classList.add('show');
        }

        // Set today's date as default
        const now = new Date();
        const nowString = now.toISOString().slice(0, 23);
        const yesterday = new Date(now - 24*60*60*1000);
        const yesterdayString = yesterday.toISOString().slice(0, 23);
        
        document.getElementById('diffStart').value = yesterdayString;
        document.getElementById('diffEnd').value = nowString;
        document.getElementById('addDate').value = now.toISOString().split('T')[0];
        document.getElementById('infoDate').value = now.toISOString().split('T')[0];
        
        // Set default values for multi-date inputs
        const multiInputs = document.querySelectorAll('.multi-date');
        multiInputs[0].value = yesterdayString;
        multiInputs[1].value = nowString;

        // Add date input
        let dateCounter = 2;
        function addDateInput() {
            dateCounter++;
            const container = document.getElementById('multiDateInputs');
            const div = document.createElement('div');
            div.className = 'input-group';
            div.innerHTML = `
                <label>Ngày ${dateCounter}:</label>
                <input type="datetime-local" class="multi-date" step="0.001">
            `;
            container.appendChild(div);
        }

        // Compare multiple dates
        function compareMultiDates() {
            const inputs = document.querySelectorAll('.multi-date');
            const dates = Array.from(inputs)
                .map(input => input.value)
                .filter(val => val)
                .map(val => new Date(val))
                .sort((a, b) => a - b);
            
            if (dates.length < 2) {
                alert('Vui lòng nhập ít nhất 2 ngày!');
                return;
            }
            
            let result = '<strong>Danh sách ngày (sắp xếp):</strong><br>';
            dates.forEach((date, i) => {
                const formatted = date.toLocaleString('vi-VN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                result += `${i + 1}. ${formatted}<br>`;
            });
            
            result += '<br><strong>Khoảng cách giữa các ngày:</strong><br>';
            for (let i = 0; i < dates.length - 1; i++) {
                const diff = dates[i + 1] - dates[i];
                const diffDays = Math.floor(diff / (1000 * 60 * 60 * 24));
                const diffHours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const diffMins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const diffSecs = Math.floor((diff % (1000 * 60)) / 1000);
                const diffMs = diff % 1000;
                
                result += `Ngày ${i + 1} → Ngày ${i + 2}: `;
                result += `${diffDays}d ${diffHours}h ${diffMins}m ${diffSecs}s ${diffMs}ms<br>`;
            }
            
            const totalDiff = dates[dates.length - 1] - dates[0];
            const totalDays = Math.floor(totalDiff / (1000 * 60 * 60 * 24));
            const totalHours = Math.floor(totalDiff / (1000 * 60 * 60));
            
            result += `<br><strong>Tổng khoảng cách (đầu → cuối):</strong><br>`;
            result += `${totalDiff.toLocaleString()} ms<br>`;
            result += `${totalDays} ngày (${totalHours} giờ)`;
            
            document.getElementById('multiText').innerHTML = result;
            document.getElementById('multiResult').classList.add('show');
        }
    </script>
</body>
</html>
